<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcSci - Calculatrice Scientifique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .display {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }
        .btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
        .operator {
            background: rgba(249, 115, 22, 0.2);
            color: #fb923c;
        }
        .scientific {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-blue-500 rounded-2xl flex items-center justify-center">
                    <i class="fas fa-calculator text-2xl"></i>
                </div>
                <div>
                    <h1 class="title-font text-3xl font-semibold tracking-tight">CalcSci</h1>
                    <p class="text-zinc-400 text-sm">Scientifique • Moderne</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleMode()" id="modeBtn"
                    class="px-4 py-2 glass rounded-2xl text-sm flex items-center gap-2 hover:bg-white/10">
                    <i class="fas fa-sun"></i>
                    <span id="modeText">Deg</span>
                </button>
            </div>
        </div>

        <!-- Display -->
        <div class="glass rounded-3xl p-6 mb-4 shadow-2xl">
            <div id="history" class="h-16 text-zinc-400 text-right text-sm overflow-y-auto mb-2 font-mono"></div>
            <div id="display" class="display text-right text-5xl font-light tracking-tighter min-h-[80px] flex items-end justify-end p-4 rounded-2xl">
                0
            </div>
        </div>

        <!-- Keyboard -->
        <div class="grid grid-cols-4 gap-3">
            <!-- Row 1 -->
            <button onclick="clearAll()" class="btn col-span-1 aspect-square glass rounded-3xl text-xl font-medium text-red-400 hover:bg-red-500/10">AC</button>
            <button onclick="backspace()" class="btn col-span-1 aspect-square glass rounded-3xl text-xl font-medium"><i class="fas fa-backspace"></i></button>
            <button onclick="appendToDisplay('(')" class="btn col-span-1 aspect-square glass rounded-3xl text-xl font-medium">(</button>
            <button onclick="appendToDisplay(')')" class="btn col-span-1 aspect-square glass rounded-3xl text-xl font-medium">)</button>

            <!-- Row 2 -->
            <button onclick="appendScientific('sin')" class="btn scientific col-span-1 aspect-square rounded-3xl text-lg">sin</button>
            <button onclick="appendScientific('cos')" class="btn scientific col-span-1 aspect-square rounded-3xl text-lg">cos</button>
            <button onclick="appendScientific('tan')" class="btn scientific col-span-1 aspect-square rounded-3xl text-lg">tan</button>
            <button onclick="appendToDisplay('/')" class="btn operator col-span-1 aspect-square rounded-3xl text-3xl font-light">÷</button>

            <!-- Row 3 -->
            <button onclick="appendScientific('log')" class="btn scientific col-span-1 aspect-square rounded-3xl text-lg">log</button>
            <button onclick="appendScientific('ln')" class="btn scientific col-span-1 aspect-square rounded-3xl text-lg">ln</button>
            <button onclick="appendToDisplay('√')" class="btn scientific col-span-1 aspect-square rounded-3xl text-2xl">√</button>
            <button onclick="appendToDisplay('*')" class="btn operator col-span-1 aspect-square rounded-3xl text-3xl font-light">×</button>

            <!-- Row 4 -->
            <button onclick="appendToDisplay('7')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">7</button>
            <button onclick="appendToDisplay('8')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">8</button>
            <button onclick="appendToDisplay('9')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">9</button>
            <button onclick="appendToDisplay('-')" class="btn operator col-span-1 aspect-square rounded-3xl text-4xl font-light">−</button>

            <!-- Row 5 -->
            <button onclick="appendToDisplay('4')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">4</button>
            <button onclick="appendToDisplay('5')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">5</button>
            <button onclick="appendToDisplay('6')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">6</button>
            <button onclick="appendToDisplay('+')" class="btn operator col-span-1 aspect-square rounded-3xl text-3xl font-light">+</button>

            <!-- Row 6 -->
            <button onclick="appendToDisplay('1')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">1</button>
            <button onclick="appendToDisplay('2')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">2</button>
            <button onclick="appendToDisplay('3')" class="btn col-span-1 aspect-square glass rounded-3xl text-3xl font-light">3</button>
            <button onclick="calculate()" class="btn col-span-1 row-span-2 bg-orange-500 hover:bg-orange-600 rounded-3xl text-4xl font-light text-white flex items-center justify-center">=</button>

            <!-- Row 7 -->
            <button onclick="appendToDisplay('0')" class="btn col-span-2 aspect-square glass rounded-3xl text-3xl font-light">0</button>
            <button onclick="appendToDisplay('.')" class="btn col-span-1 aspect-square glass rounded-3xl text-4xl font-light">.</button>
        </div>

        <div class="text-center mt-8 text-zinc-500 text-xs flex items-center justify-center gap-4">
            <a href="https://github.com/samizia31/scientific-calculator" target="_blank" class="hover:text-white transition-colors">GitHub</a>
            <span>•</span>
            <span>Made with ❤️ par Grok</span>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let history = document.getElementById('history');
        let currentInput = '0';
        let isNewCalculation = false;
        let isDegreeMode = true;

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function appendToDisplay(value) {
            if (isNewCalculation) {
                currentInput = '0';
                isNewCalculation = false;
            }
            if (currentInput === '0' && value !== '.' && !['+', '-', '*', '/'].includes(value)) {
                currentInput = value;
            } else {
                currentInput += value;
            }
            updateDisplay();
        }

        function appendScientific(func) {
            if (isNewCalculation) {
                currentInput = '0';
                isNewCalculation = false;
            }
            currentInput += func + '(';
            updateDisplay();
        }

        function clearAll() {
            currentInput = '0';
            updateDisplay();
            history.innerHTML = '';
        }

        function backspace() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function toggleMode() {
            isDegreeMode = !isDegreeMode;
            const btn = document.getElementById('modeBtn');
            const text = document.getElementById('modeText');
            text.textContent = isDegreeMode ? 'Deg' : 'Rad';
        }

        function calculate() {
            try {
                let expression = currentInput
                    .replace(/√/g, 'Math.sqrt')
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/sin\(/g, isDegreeMode ? 'Math.sin(Math.PI/180 * ' : 'Math.sin(')
                    .replace(/cos\(/g, isDegreeMode ? 'Math.cos(Math.PI/180 * ' : 'Math.cos(')
                    .replace(/tan\(/g, isDegreeMode ? 'Math.tan(Math.PI/180 * ' : 'Math.tan(')
                    .replace(/log/g, 'Math.log10')
                    .replace(/ln/g, 'Math.log');

                // Handle closing parentheses
                let openCount = (expression.match(/\(/g) || []).length;
                let closeCount = (expression.match(/\)/g) || []).length;
                expression += ')'.repeat(Math.max(0, openCount - closeCount));

                let result = eval(expression);

                history.innerHTML += `<div>${currentInput} = ${parseFloat(result.toFixed(8))}</div>`;
                history.scrollTop = history.scrollHeight;

                currentInput = parseFloat(result.toFixed(8)).toString();
                isNewCalculation = true;
                updateDisplay();
            } catch (e) {
                currentInput = 'Erreur';
                isNewCalculation = true;
                updateDisplay();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Backspace') backspace();
            if (e.key === 'Escape') clearAll();
            if ('0123456789.+-*/()'.includes(e.key)) appendToDisplay(e.key);
        });

        updateDisplay();
    </script>
</body>
</html>
